name: Deploy Web to Netlify

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - 'netlify.toml'
      - 'scripts/**'
  workflow_dispatch:

# Allow the workflow to push the version-bump commit back to main
permissions:
  contents: write

jobs:
  build-and-deploy:
    name: Bump version → Build Expo Web → Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout (full history needed for git log / tagging) ────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so bump script can read all tags
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Node setup ──────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # ── 3. Install dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Bump version (conventional commits) ────────────────────────────
      # feat!: / BREAKING CHANGE → major | feat: → minor | fix: etc → patch
      - name: Bump version
        id: version
        run: python3 scripts/bump-version.py

      # ── 5. Build Expo web (outputs to apps/mobile/dist/) ──────────────────
      - name: Build Expo web
        working-directory: apps/mobile
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: npx expo export --platform web

      # ── 6. Deploy to Netlify ───────────────────────────────────────────────
      # Deploy via Netlify REST API (zip upload) - bypasses netlify-cli entirely
      # to avoid npm workspaces detection and @netlify/build pipeline.
      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          cd apps/mobile/dist
          zip -r /tmp/deploy.zip .
          RESPONSE=$(curl -s -X POST \
            "https://api.netlify.com/api/v1/sites/${NETLIFY_SITE_ID}/deploys" \
            -H "Authorization: Bearer ${NETLIFY_AUTH_TOKEN}" \
            -H "Content-Type: application/zip" \
            --data-binary @/tmp/deploy.zip)
          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          state = d.get('state','unknown')
          url   = d.get('ssl_url') or d.get('url','')
          eid   = d.get('id','')
          print(f'Deploy ID: {eid}')
          print(f'State:     {state}')
          print(f'URL:       {url}')
          if state not in ('ready','uploaded','processing','building'):
              print('ERROR response:', json.dumps(d, indent=2))
              sys.exit(1)
          "

      # ── 7. Commit version bump + create git tag ────────────────────────────
      # [skip ci] prevents this commit from re-triggering the workflow.
      - name: Commit version bump & tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/mobile/app.json apps/mobile/package.json
          git commit -m "chore(release): v${{ steps.version.outputs.version }} [skip ci]"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin HEAD:main --follow-tags

