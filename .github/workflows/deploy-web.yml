name: Deploy Web to Netlify

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - 'netlify.toml'
      - 'scripts/**'
  workflow_dispatch:

# Allow the workflow to push the version-bump commit back to main
permissions:
  contents: write

jobs:
  build-and-deploy:
    name: Bump version → Build Expo Web → Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout (full history needed for git log / tagging) ────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so bump script can read all tags
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Node setup ──────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/mobile/package-lock.json

      # ── 3. Install dependencies ────────────────────────────────────────────
      - name: Install dependencies
        working-directory: apps/mobile
        run: npm ci

      # ── 4. Bump version (conventional commits) ────────────────────────────
      # feat!: / BREAKING CHANGE → major | feat: → minor | fix: etc → patch
      - name: Bump version
        id: version
        run: python3 scripts/bump-version.py

      # ── 5. Build Expo web (outputs to apps/mobile/dist/) ──────────────────
      - name: Build Expo web
        working-directory: apps/mobile
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: npx expo export --platform web

      # ── 6. Deploy to Netlify ───────────────────────────────────────────────
      - name: Deploy to Netlify
        uses: netlify/actions/cli@master
        with:
          args: deploy --dir=apps/mobile/dist --prod --message="v${{ steps.version.outputs.version }} (${{ steps.version.outputs.bump_type }}) — ${{ github.sha }}"
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

      # ── 7. Commit version bump + create git tag ────────────────────────────
      # [skip ci] prevents this commit from re-triggering the workflow.
      - name: Commit version bump & tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/mobile/app.json apps/mobile/package.json
          git commit -m "chore(release): v${{ steps.version.outputs.version }} [skip ci]"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin HEAD:main --follow-tags

